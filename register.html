<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | SkillConnect Botswana</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="services.html">Find Skills</a></li>
<li><a href="register.html">Register</a></li>
</ul>
</nav>

<section class="register-container">

<div class="register-box">

<h2>Create Account</h2>

<!-- USER TYPE -->
<div class="user-type">
<button type="button" id="customerBtn" onclick="selectUser('customer')" class="active">
Customer
</button>

<button type="button" id="providerBtn" onclick="selectUser('provider')">
Service Provider
</button>
</div>

<p id="info">Register to find services.</p>

<form onsubmit="handleRegister(event)">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<!-- ONLY FOR PROVIDERS -->
<div id="providerFields" style="display:none;">

<input type="text" id="skill" placeholder="Your Skill (e.g Baking)" required>

<input type="number" id="price" placeholder="Service Price (BWP)" required>


</div>

<button type="submit">Register</button>

</form>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
